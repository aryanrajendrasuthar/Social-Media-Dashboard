version: '3.9'

services:
  mongodb:
    image: mongo:7
    container_name: social_mongo
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db
    networks:
      - social_net

  redis:
    image: redis:7-alpine
    container_name: social_redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    networks:
      - social_net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: social_backend
    restart: unless-stopped
    ports:
      - '5000:5000'
    env_file:
      - ./backend/.env
    environment:
      - MONGO_URI=mongodb://mongodb:27017/social_dashboard
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    volumes:
      - ./backend/uploads:/app/uploads
    depends_on:
      - mongodb
      - redis
    networks:
      - social_net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: social_frontend
    restart: unless-stopped
    ports:
      - '3000:80'
    depends_on:
      - backend
    networks:
      - social_net

volumes:
  mongo_data:
  redis_data:

networks:
  social_net:
    driver: bridge
